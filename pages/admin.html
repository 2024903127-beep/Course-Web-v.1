<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin | Premium Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <div class="admin-app">
    <aside class="admin-sidebar">
      <div class="logo">Nova<span>.</span></div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="admin.html" class="active">Admin</a>
      </nav>
      <div class="admin-meta">
        <div id="adminEmail" class="admin-email">Loading...</div>
        <button id="logoutBtn" class="btn-outline">Logout</button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-top">
        <div>
          <h1>Admin Studio</h1>
          <p>Create courses, chapters, and lessons in one flow</p>
        </div>
        <div class="admin-badges">
          <div class="badge" id="totalCourses">Courses: 0</div>
        </div>
      </header>

      <section class="admin-card">
        <div class="card-header">
          <h2>Course Workspace</h2>
          <div class="inline">
            <select id="courseSelect"></select>
            <button class="btn-outline" id="newCourseBtn" type="button">New Course</button>
          </div>
        </div>

        <form id="courseForm" class="form-grid">
          <input type="hidden" id="courseId" />
          <label>
            Title
            <input id="courseTitle" type="text" placeholder="Course title" required />
          </label>
          <label>
            Description
            <textarea id="courseDescription" rows="3" placeholder="Short description"></textarea>
          </label>
          <label>
            Duration
            <input id="courseDuration" type="text" placeholder="e.g., 2h 15m" />
          </label>
          <label>
            Price
            <input id="coursePrice" type="number" min="0" step="0.01" placeholder="0 for free" />
          </label>
          <label>
            Link
            <input id="courseLink" type="text" placeholder="course.html?course=..." />
          </label>
          <label>
            Thumbnail URL
            <input id="courseThumbnailUrl" type="text" placeholder="https://..." />
          </label>
          <label>
            Upload Thumbnail
            <input id="courseThumbnailFile" type="file" accept="image/*" />
          </label>
          <div class="thumb-preview" id="thumbnailPreview">No thumbnail</div>
          <div class="thumb-note">Auto-crop preview (4:5). Keep important content centered.</div>
          <label class="checkbox">
            <input id="coursePaid" type="checkbox" />
            Paid Course
          </label>
          <label class="checkbox">
            <input id="courseLocked" type="checkbox" />
            Locked
          </label>
          <div class="form-actions">
            <button class="btn-primary" id="saveCourseBtn" type="submit">Save Course</button>
            <button class="btn-outline" id="deleteCourseBtn" type="button">Delete Course</button>
          </div>
        </form>
      </section>

      <section class="admin-card split">
        <div>
          <h2>Chapters</h2>
          <form id="chapterForm" class="form-grid">
            <input type="hidden" id="chapterId" />
            <label>
              Chapter Title
              <input id="chapterTitle" type="text" placeholder="Chapter 1: Basics" required />
            </label>
            <label>
              Position
              <input id="chapterPosition" type="number" min="1" value="1" />
            </label>
            <div class="form-actions">
              <button class="btn-primary" id="saveChapterBtn" type="submit">Save Chapter</button>
              <button class="btn-outline" id="resetChapterBtn" type="button">Reset</button>
            </div>
          </form>
          <div id="chaptersList" class="list"></div>
        </div>

        <div>
          <h2>Lessons</h2>
          <form id="lessonForm" class="form-grid">
            <input type="hidden" id="lessonId" />
            <label>
              Chapter
              <select id="lessonChapter"></select>
            </label>
            <label>
              Lesson Title
              <input id="lessonTitle" type="text" placeholder="Lesson title" required />
            </label>
            <label>
              Position
              <input id="lessonPosition" type="number" min="1" value="1" />
            </label>
            <label>
              Video URL (YouTube/Drive)
              <input id="lessonVideoUrl" type="text" placeholder="https://..." />
            </label>
            <label>
              PDF URL (Drive/Direct)
              <input id="lessonPdfUrl" type="text" placeholder="https://..." />
            </label>
            <label>
              Upload Video File
              <input id="lessonVideoFile" type="file" accept="video/*" />
            </label>
            <label>
              Upload PDF File
              <input id="lessonPdfFile" type="file" accept="application/pdf" />
            </label>
            <div class="form-actions">
              <button class="btn-primary" id="saveLessonBtn" type="submit">Save Lesson</button>
              <button class="btn-outline" id="resetLessonBtn" type="button">Reset</button>
            </div>
          </form>
          <div id="lessonsList" class="list"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script src="../assets/js/cookie-consent.js"></script>
</body>
</html>
