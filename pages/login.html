<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Rahul Mishra - Premium Trading Education</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../assets/css/login.css" />
</head>
<body>

  <div class="auth-wrapper">
    <!-- Trading-themed background elements -->
    <div class="trading-bg-elements">
      <div class="chart-line"></div>
      <div class="candlestick"></div>
      <div class="trading-icon">&#128200;</div>
    </div>

    <div class="auth-card">
      <!-- Logo/Brand -->
      <div class="brand-header">
        <div class="brand-logo">
          <span class="brand-name">Rahul Mishra</span>
          <span class="brand-tagline">Trading Education</span>
        </div>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Access your premium trading courses and mentorship</p>

      <form id="loginForm" novalidate>

        <div class="input-group">
          <input type="email" id="email" required />
          <label>Email Address</label>
          <span class="icon">&#128231;</span>
        </div>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="agree" />
            <span>
              I agree to the
              <a href="privacy-policy.html" target="_blank">Privacy Policy</a> &amp;
              <a href="terms.html" target="_blank">Terms</a>
            </span>
          </label>
        </div>

        <button type="submit" id="loginBtn" disabled>
          <span class="btn-text">Send Login Code</span>
          <span class="btn-icon">&#8594;</span>
        </button>
        <div id="loginLoading" class="loading-text hidden">Sending code...</div>

      </form>

      <div class="footer-text">
        New to trading education?
        <a href="signup.html">Create your account</a>
      </div>

      <!-- Trust indicators -->
      <div class="trust-indicators">
        <div class="trust-item">
          <span class="trust-icon">&#128274;</span>
          <span>Secure &amp; Encrypted</span>
        </div>
        <div class="trust-item">
          <span class="trust-icon">&#128737;</span>
          <span>Privacy Protected</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>

  <!-- Auto-redirect if session exists -->
  <script>
    window.supabase.auth.getSession().then(({ data }) => {
      if (data.session) {
        window.location.replace("dashboard.html");
      }
    });
  </script>

  <!-- Login logic -->
  <script src="../assets/js/login.js"></script>

  <script src="../assets/js/cookie-consent.js"></script>
</body>
</html>
