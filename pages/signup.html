<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up | Rahul Mishra - Premium Trading Education</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../assets/css/signup.css">
</head>
<body>

  <div class="auth-wrapper">
    <!-- Trading-themed background elements -->
    <div class="trading-bg-elements">
      <div class="chart-line"></div>
      <div class="candlestick"></div>
      <div class="trading-icon">💹</div>
    </div>

    <div class="auth-card">
      <!-- Logo/Brand -->
      <div class="brand-header">
        <div class="brand-logo">
          <span class="brand-name">Rahul Mishra</span>
          <span class="brand-tagline">Trading Education</span>
        </div>
      </div>

      <h2>Start Your Trading Journey</h2>
      <p class="subtitle">Join premium trading education with proven strategies</p>

      <form id="signupForm">

        <div class="field">
          <input type="text" id="name" required />
          <label for="name">Full Name</label>
          <span class="icon">👤</span>
        </div>

        <div class="field">
          <input type="email" id="email" required />
          <label for="email">Email Address</label>
          <span class="icon">📧</span>
        </div>

        <div class="field">
          <input type="tel" id="mobile" required />
          <label for="mobile">Mobile Number</label>
          <span class="icon">📱</span>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="agree" required />
          <label for="agree">
            I agree to the
            <a href="privacy-policy.html" target="_blank">Privacy Policy</a> &
            <a href="terms.html" target="_blank">Terms</a>
          </label>
        </div>

        <button type="submit">
          <span class="btn-text">Create Account</span>
          <span class="btn-icon">→</span>
        </button>

      </form>

      <div class="footer-text">
        Already have an account?
        <a href="login.html">Login</a>
      </div>

      <!-- Trust indicators -->
      <div class="trust-indicators">
        <div class="trust-item">
          <span class="trust-icon">🔒</span>
          <span>Secure & Encrypted</span>
        </div>
        <div class="trust-item">
          <span class="trust-icon">🛡️</span>
          <span>Privacy Protected</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>

  <!-- 🔐 Auto-redirect if session exists -->
  <script>
    window.supabase.auth.getSession().then(({ data }) => {
      if (data.session) {
        window.location.replace("dashboard.html");
      }
    });
  </script>

  <!-- Signup logic -->
  <script src="../assets/js/signup.js"></script>

  <script src="../assets/js/cookie-consent.js"></script>
</body>
</html>
